# yaml-language-server: $schema=https://coderabbit.ai/integrations/schema.v2.json
#
# Baseline CodeRabbit config for repos created from this template.
# Adjust path_filters per-repo once the project's actual language/structure
# is known (node_modules, lockfiles, generated assets, etc).
language: "en-US"
early_access: false

reviews:
  profile: "chill"
  request_changes_workflow: false
  high_level_summary: true
  poem: false
  review_status: true
  collapse_walkthrough: false

  auto_review:
    enabled: true
    drafts: false
    ignore_usernames:
      - "dependabot[bot]"
      - "renovate[bot]"
      - "github-actions[bot]"

chat:
  auto_reply: true
